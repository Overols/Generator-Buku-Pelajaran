
<!DOCTYPE html>
<html lang="id" class="scroll-smooth antialiased">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pena Pendidikan - Generator Buku Pelajaran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.11/dist/purify.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              brand: {
                bg: '#020617',      // Slate 950
                surface: '#0f172a', // Slate 900
                surface2: '#1e293b', // Slate 800
                border: '#334155',  // Slate 700
                text: '#f8fafc',    // Slate 50
                muted: '#94a3b8',   // Slate 400
                primary: '#0ea5e9', // Sky 500 (Education Blue)
                accent: '#10b981',  // Emerald 500
              },
            },
            fontFamily: {
              sans: ['Inter', 'system-ui', 'sans-serif'],
              mono: ['JetBrains Mono', 'Fira Code', 'monospace'],
            },
            animation: {
              'fade-in': 'fadeIn 0.4s ease-out',
              'shimmer': 'shimmer 2s linear infinite',
            },
            keyframes: {
              fadeIn: {
                '0%': { opacity: '0', transform: 'translateY(10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
              shimmer: {
                '0%': { backgroundPosition: '-200% 0' },
                '100%': { backgroundPosition: '200% 0' },
              }
            }
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      body {
        background-color: #020617; /* brand.bg */
        color: #f8fafc; /* brand.text */
      }
      
      /* Premium Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }

      /* Glassmorphism Utility */
      .glass {
        background: rgba(15, 23, 42, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      }

      .highlight-animation {
        animation: highlight-section 2s ease-out;
        border-radius: 0.5rem;
      }
      @keyframes highlight-section {
        from { background-color: rgba(14, 165, 233, 0.15); } /* Sky Blue tint */
        to { background-color: transparent; }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react-dom/client": "https://aistudiocdn.com/react-dom@19.0.0/client",
    "react-dom": "https://aistudiocdn.com/react-dom@19.0.0",
    "react": "https://aistudiocdn.com/react@19.0.0",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@testing-library/jest-dom": "https://esm.sh/@testing-library/jest-dom@^6.9.1",
    "vitest": "https://esm.sh/vitest@^4.0.18",
    "vitest/": "https://esm.sh/vitest@^4.0.18/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-type="module" data-presets="env,react,typescript" src="/index.tsx"></script>
  </body>
</html>
